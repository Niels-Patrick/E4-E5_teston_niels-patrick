name: Frontend CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: frontend-ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WORKING_DIRECTORY: tictactoe
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/e4-e5-tictactoe-frontend
  AZURE_IMAGE_NAME: ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io/e4-e5-frontend

jobs:
  ci:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.19.0
          cache: pnpm
          cache-dependency-path: |
            tictactoe/pnpm-lock.yaml
            pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run fast lint checks
        run: pnpm lint:oxlint

      - name: Run tests
        run: pnpm vitest run

      - name: Build application
        run: pnpm build

  publish-image:
    name: Publish Docker Image
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Validate Azure registry secret format
        run: |
          if [ -z "${{ secrets.AZURE_CONTAINER_REGISTRY }}" ]; then
            echo "AZURE_CONTAINER_REGISTRY is empty"
            exit 1
          fi
          if [[ "${{ secrets.AZURE_CONTAINER_REGISTRY }}" == *".azurecr.io"* ]]; then
            echo "AZURE_CONTAINER_REGISTRY must be only the registry name (example: tttcontainerregistry)"
            exit 1
          fi
          if [ -z "${{ secrets.AZURE_REGISTRY_USERNAME }}" ]; then
            echo "AZURE_REGISTRY_USERNAME is empty"
            exit 1
          fi
          if [ -z "${{ secrets.AZURE_REGISTRY_PASSWORD }}" ]; then
            echo "AZURE_REGISTRY_PASSWORD is empty"
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Extract Docker metadata for GitHub
        id: meta-github
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      - name: Extract Docker metadata for Azure
        id: meta-azure
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.AZURE_IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image to both registries
        uses: docker/build-push-action@v6
        with:
          context: ./tictactoe
          file: ./tictactoe/Dockerfile
          push: true
          tags: |
            ${{ steps.meta-github.outputs.tags }}
            ${{ steps.meta-azure.outputs.tags }}
          labels: ${{ steps.meta-github.outputs.labels }}

  deploy-to-azure:
    name: Deploy to Azure Container Instances
    needs: publish-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: >-
            {"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}

      - name: Create or update Azure Container Instance
        run: |
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name e4-e5-frontend \
            --image ${{ env.AZURE_IMAGE_NAME }}:latest \
            --registry-login-server ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io \
            --registry-username ${{ secrets.AZURE_REGISTRY_USERNAME }} \
            --registry-password ${{ secrets.AZURE_REGISTRY_PASSWORD }} \
            --ports 80 \
            --cpu 1 \
            --memory 1 \
            --restart-policy Always \
            --ip-address Public \
            --dns-name-label e4-e5-frontend \
            --overwrite || \
          az container update \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name e4-e5-frontend \
            --image ${{ env.AZURE_IMAGE_NAME }}:latest

      - name: Get container FQDN
        run: |
          az container show \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name e4-e5-frontend \
            --query ipAddress.fqdn