services:
  e4-e5-frontend:
    build:
      context: ./tictactoe
      dockerfile: Dockerfile
    container_name: e4-e5-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      API_UPSTREAM_HOST: ${API_UPSTREAM_HOST:-e2-e3-tictactoe}
      API_UPSTREAM_PORT: ${API_UPSTREAM_PORT:-5000}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - shared-network

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: e4-e5-uptime-kuma
    restart: unless-stopped
    ports:
      - "${UPTIME_KUMA_PORT:-3002}:3001"
    volumes:
      - e4-e5-uptime-kuma-data:/app/data
    depends_on:
      e4-e5-frontend:
        condition: service_healthy
    networks:
      - shared-network

networks:
  shared-network:
    external: true
    name: ${SHARED_DOCKER_NETWORK:-tictactoe-shared-network}

volumes:
  e4-e5-uptime-kuma-data: